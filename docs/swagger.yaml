openapi: 3.0.0
info:
  title: Equipment Post Management API
  version: 1.0.0
  description: API documentation for the Equipment Post Management module
servers:
  - url: http://localhost:3000/api
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    EquipmentPost:
      type: object
      properties:
        id:
          type: string
          format: uuid
        seller_id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [MRI, X-Ray, Cathlab, ECG, Ultrasound, Ventilator, CT Scan, Patient Monitor, Defibrillator, Laboratory Equipment, Surgical Equipment, Other]
        brand:
          type: string
        model:
          type: string
        manufacturing_year:
          type: integer
        condition:
          type: string
          enum: [Used, Refurbished, Spare]
        price:
          type: number
        city:
          type: string
        state:
          type: string
        country:
          type: string
        status:
          type: string
          enum: [Draft, Active, Sold, Archived]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

paths:
  /equipment:
    get:
      summary: List equipment posts
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: condition
          schema:
            type: string
        - in: query
          name: city
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
      responses:
        '200':
          description: A list of active equipment posts
    post:
      summary: Create an equipment post
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - title
                - category
                - brand
                - model
                - condition
                - city
              properties:
                title:
                  type: string
                  example: GE MRI Machine 1.5T
                description:
                  type: string
                  example: Fully serviced MRI machine in excellent condition
                category:
                  type: string
                  enum: [MRI, X-Ray, Cathlab, ECG, Ultrasound, Ventilator, CT Scan, Patient Monitor, Defibrillator, Laboratory Equipment, Surgical Equipment, Other]
                brand:
                  type: string
                  example: GE Healthcare
                model:
                  type: string
                  example: SIGNA Artist
                manufacturingYear:
                  type: integer
                  example: 2019
                condition:
                  type: string
                  enum: [Used, Refurbished, Spare]
                price:
                  type: number
                  example: 2500000
                city:
                  type: string
                  example: Mumbai
                state:
                  type: string
                  example: Maharashtra
                country:
                  type: string
                  example: India
                images:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '201':
          description: Equipment post created successfully
  /equipment/{id}:
    get:
      summary: Get single equipment post
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Equipment details and images
    put:
      summary: Update an equipment post
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                category:
                  type: string
                  enum: [MRI, X-Ray, Cathlab, ECG, Ultrasound, Ventilator, CT Scan, Patient Monitor, Defibrillator, Laboratory Equipment, Surgical Equipment, Other]
                brand:
                  type: string
                model:
                  type: string
                manufacturingYear:
                  type: integer
                condition:
                  type: string
                  enum: [Used, Refurbished, Spare]
                price:
                  type: number
                city:
                  type: string
                state:
                  type: string
                country:
                  type: string
                deletedImages:
                  type: array
                  items:
                    type: integer
                  description: Array of image IDs to delete
                newImages:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: Post updated successfully
    delete:
      summary: Delete (archive) an equipment post
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Post deleted successfully
  /equipment/{id}/status:
    patch:
      summary: Update equipment post status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [Draft, Active, Sold, Archived]
      responses:
        '200':
          description: Status updated successfully
